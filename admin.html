<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administração — Rede de Rodas do DF</title>
<link rel="icon" href="assets/logotiporodas.png" type="image/png">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/dashboard.css">
<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js" defer></script>
<script src="js/helpers.js" defer></script>
<script src="js/auth.js" defer></script>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="index.html">Rede de Rodas do DF</a>
    <nav class="site-nav" data-auth-slot></nav>
  </div>
</header>
<div class="dash-main" style="padding:24px;max-width:900px;margin:0 auto">
  <h1 style="font-size:1.25rem;margin-bottom:12px">Administração</h1>
  <p class="dash-placeholder">Área <strong>Bloco 4</strong>: gestão de usuários e moderação de rodas pendentes.</p>
  <p><a href="index.html">← Site</a></p>
</div>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  if (window.updateHeaderAuth) await updateHeaderAuth();
  var x = await getSessionUser();
  if (!x.user) {
    location.href = 'login.html?next=' + encodeURIComponent(location.pathname);
    return;
  }
  if (!x.profile || x.profile.role !== 'admin') {
    toast('Acesso restrito a administradores.', 'err');
    location.href = 'dashboard-usuario.html';
    return;
  }
});
</script>
</body>
</html>
