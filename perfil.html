<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu perfil — Rede de Rodas do DF</title>
<link rel="icon" href="assets/logotiporodas.png" type="image/png">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/forms.css">
<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js" defer></script>
<script src="js/helpers.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/perfil.js" defer></script>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="index.html">Rede de Rodas do DF</a>
    <nav class="site-nav" data-auth-slot><span class="loading-inline">…</span></nav>
  </div>
</header>

<main class="landing-wrap" style="max-width:640px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <h1 style="font-size:1.35rem">Área do perfil</h1>
    <button type="button" class="help-btn" onclick="openHelp('Perfil','Aqui você gerencia seus dados pessoais e vê as rodas às quais está vinculada.')" title="Ajuda">?</button>
  </div>

  <p style="font-size:14px;color:var(--gray-600);margin-bottom:20px">Papel: <strong id="pf-role">—</strong></p>

  <form id="form-perfil">
    <div class="form-group"><label for="pf-nome">Nome</label><input id="pf-nome" name="nome" autocomplete="name"></div>
    <div class="form-group"><label for="pf-email">E-mail</label><input id="pf-email" type="email" readonly></div>
    <div class="form-group"><label for="pf-tel">Telefone</label><input id="pf-tel" name="telefone" autocomplete="tel"></div>
    <div class="form-group"><label for="pf-circ">Circunscrição / região</label><input id="pf-circ" name="circunscricao"></div>
    <div class="form-group"><label for="pf-bio">Bio</label><textarea id="pf-bio" name="bio" maxlength="800"></textarea></div>
    <div class="form-actions"><button type="submit" class="btn btn-primary">Salvar alterações</button> <a class="btn btn-secondary" href="index.html">Voltar ao site</a></div>
  </form>

  <h2 style="font-size:1.1rem;margin:32px 0 12px">Rodas vinculadas</h2>
  <div id="pf-rodas-list"><p class="empty-state">Carregando…</p></div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (window.updateHeaderAuth) updateHeaderAuth();
  if (window.initPerfilPage) initPerfilPage();
});
</script>
</body>
</html>
