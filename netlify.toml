# Site estático na raiz (várias páginas .html + assets).
# https://docs.netlify.com/configure-builds/overview/

[build]
  publish = "."

# Fallback SPA: arquivos estáticos existentes têm prioridade sobre esta regra.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
