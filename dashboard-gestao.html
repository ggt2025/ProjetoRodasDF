<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão — Rede de Rodas do DF</title>
<link rel="icon" href="assets/logotiporodas.png" type="image/png">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/dashboard.css">
<script>
window.RODASDF_CONFIG = { url: 'https://YOUR_PROJECT.supabase.co', anonKey: 'YOUR_SUPABASE_ANON_KEY' };
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js" defer></script>
<script src="js/helpers.js" defer></script>
<script src="js/auth.js" defer></script>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="index.html">Rede de Rodas do DF</a>
    <nav class="site-nav" data-auth-slot></nav>
  </div>
</header>
<div class="dash-layout">
  <aside class="dash-sidebar">
    <a href="dashboard-gestao.html">Dashboard</a>
    <a href="#">Encaminhamentos</a>
    <a href="#">Equipe</a>
    <a href="#">Parceiros / Pontes</a>
    <a href="#">Site público</a>
    <a href="#">Fórum privado</a>
    <a href="#">Registro de atividades</a>
  </aside>
  <div class="dash-main">
    <p class="dash-placeholder">Área da gestão — <strong>Bloco 3</strong>. Acesso restrito a perfis <code>gestao</code> ou <code>admin</code>.</p>
    <p><a href="index.html">← Site público</a></p>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  if (window.updateHeaderAuth) await updateHeaderAuth();
  var x = await getSessionUser();
  if (!x.user) {
    location.href = 'login.html?next=' + encodeURIComponent(location.pathname);
    return;
  }
  var r = x.profile && x.profile.role;
  if (r !== 'gestao' && r !== 'admin') {
    toast('Acesso restrito à gestão.', 'err');
    location.href = 'dashboard-usuario.html';
    return;
  }
});
</script>
</body>
</html>
